name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
    
    - name: Download EasyX
      run: |
        Invoke-WebRequest -Uri "https://easyx.cn/download/EasyX_20240913(beta).exe" -OutFile "EasyX.exe"
    
    - name: Install EasyX
      run: |
        Start-Process -FilePath "./EasyX.exe" -ArgumentList "/S" -Wait
    
    - name: Download CMake
      run: |
        Invoke-WebRequest -Uri "https://github.com/Kitware/CMake/releases/download/v3.30.3/cmake-3.30.3-windows-x86_64.zip" -OutFile "cmake.zip"
        Expand-Archive -Path "cmake.zip" -DestinationPath "."
    
    - name: Add CMake to PATH
      run: |
        $cmakeDir = Get-ChildItem -Path "." -Name "cmake-*" | Select-Object -First 1
        $env:PATH += ";$pwd\$cmakeDir\bin"
        echo "PATH=$env:PATH" >> $env:GITHUB_ENV
    
    - name: Build project
      run: |
        mkdir build
        cd build
        cmake ..
        cmake --build . --config Release
    
    - name: Create release package
      run: |
        mkdir release
        copy build\bin\huaBan-pro.exe release\
        copy README.md release\
        Compress-Archive -Path "release\*" -DestinationPath "huaBan-pro-release.zip"
    
    - name: Create GitHub Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false
    
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./huaBan-pro-release.zip
        asset_name: huaBan-pro-release.zip
        asset_content_type: application/zip